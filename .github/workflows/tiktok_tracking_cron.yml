name: TikTok Tracking - Daily Fetch
on:
  schedule:
    # Run daily at 15:00 UTC (= 00:00 JST)
    - cron: '0 15 * * *'
  workflow_dispatch:  # Allow manual trigger

jobs:
  fetch_all:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Fetch all tracked TikTok videos
        run: |
          RESPONSE=$(curl -sf --max-time 120 -X POST \
            "https://aitherhubapi-cpcjcnezbgf5f7e2.japaneast-01.azurewebsites.net/api/v1/tiktok-tracking/cron/fetch-all" \
            -H "X-Admin-Key: ${{ secrets.ADMIN_API_KEY }}" \
            -H "Content-Type: application/json" || echo '{"error":"request_failed"}')
          echo "Response: $RESPONSE"
          
          # Parse results
          FETCHED=$(echo "$RESPONSE" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('fetched',0))" 2>/dev/null || echo "?")
          SKIPPED=$(echo "$RESPONSE" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('skipped',0))" 2>/dev/null || echo "?")
          ERRORS=$(echo "$RESPONSE" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('errors',0))" 2>/dev/null || echo "?")
          STOPPED=$(echo "$RESPONSE" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('stopped',0))" 2>/dev/null || echo "?")
          
          echo "📊 Results: fetched=$FETCHED, skipped=$SKIPPED, errors=$ERRORS, stopped=$STOPPED"
          
          # Fail if there was an error in the request itself
          if echo "$RESPONSE" | grep -q '"error"'; then
            echo "❌ Cron job failed"
            exit 1
          fi
          
          echo "✅ TikTok tracking cron completed successfully"
