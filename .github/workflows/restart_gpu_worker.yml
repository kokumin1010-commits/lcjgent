# ╔══════════════════════════════════════════════════════════════════════════════╗
# ║  SAFETY: Pod restart/stop/delete operations have been PERMANENTLY REMOVED.  ║
# ║  Pod lifecycle must ONLY be managed via RunPod Console by a human operator. ║
# ║  This workflow now only performs a READ-ONLY health check.                  ║
# ╚══════════════════════════════════════════════════════════════════════════════╝
name: GPU Worker Health Check (Read-Only)

on:
  workflow_dispatch:

env:
  POD_ID: 9sr6mwmf6kcj5f

jobs:
  health-check:
    runs-on: ubuntu-latest
    steps:
      - name: "Health check GPU Worker Pod (READ-ONLY, no mutations)"
        run: |
          echo "🔍 Checking GPU Worker health..."
          echo "Pod ID: ${POD_ID}"
          echo ""
          
          HEALTH=$(curl -s --max-time 15 "https://${POD_ID}-8888.proxy.runpod.net/api/health" \
            -H "X-Api-Key: aitherhub" || echo "TIMEOUT")
          echo "Health response: ${HEALTH}"
          
          if echo "${HEALTH}" | grep -q "ok"; then
            echo "✅ GPU Worker is healthy!"
          else
            echo "⚠️ GPU Worker is not responding."
            echo ""
            echo "To restart the pod, go to RunPod Console:"
            echo "  https://www.runpod.io/console/pods"
            echo "  Find pod: ${POD_ID}"
            echo "  Click: Stop → Start"
            echo ""
            echo "⛔ Pod restart via code is PERMANENTLY DISABLED for safety."
          fi
