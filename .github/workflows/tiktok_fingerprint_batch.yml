name: TikTok - Generate Audio Fingerprints (Batch)
on:
  workflow_dispatch:
    inputs:
      batch_size:
        description: 'Number of clips to process per batch'
        required: false
        default: '50'

jobs:
  generate_fingerprints:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Generate fingerprints batch
        run: |
          BATCH_SIZE="${{ github.event.inputs.batch_size || '50' }}"
          echo "Processing batch of $BATCH_SIZE clips..."
          
          RESPONSE=$(curl -sf --max-time 300 -X POST \
            "https://aitherhubapi-cpcjcnezbgf5f7e2.japaneast-01.azurewebsites.net/api/v1/tiktok-tracking/fingerprints/generate-batch?limit=$BATCH_SIZE" \
            -H "X-Admin-Key: ${{ secrets.ADMIN_API_KEY }}" \
            -H "Content-Type: application/json" || echo '{"error":"request_failed"}')
          echo "Response: $RESPONSE"
          
          PROCESSED=$(echo "$RESPONSE" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('processed',0))" 2>/dev/null || echo "?")
          SUCCESS=$(echo "$RESPONSE" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('success',0))" 2>/dev/null || echo "?")
          FAILED=$(echo "$RESPONSE" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('failed',0))" 2>/dev/null || echo "?")
          REMAINING=$(echo "$RESPONSE" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('remaining',0))" 2>/dev/null || echo "?")
          
          echo "📊 Results: processed=$PROCESSED, success=$SUCCESS, failed=$FAILED, remaining=$REMAINING"
          
          if echo "$RESPONSE" | grep -q '"error"'; then
            echo "❌ Batch job failed"
            exit 1
          fi
          
          echo "✅ Fingerprint batch completed"
