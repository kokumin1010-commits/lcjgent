name: Build and deploy Python app to Azure Web App - aitherhubAPI

on:
  push:
    branches:
      - master
  workflow_dispatch:

concurrency:
  group: deploy-aitherhubapi
  cancel-in-progress: true

env:
  AZURE_WEBAPP_NAME: aitherhubAPI
  AZURE_RG: rg-vdp-kyogoku
  SLOT_NAME: staging

jobs:
  pre_deploy_check:
    runs-on: ubuntu-latest
    name: Pre-deploy smoke test
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run startup smoke test
        run: python tests/test_startup_smoke.py

      - name: Run import boundary tests
        run: python tests/test_import_boundaries.py

  build_and_deploy:
    needs: pre_deploy_check
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Python 3.10 (matching Azure runtime)
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Build antenv with dependencies
        working-directory: backend
        run: |
          echo "Building antenv with pip install..."
          python -m venv antenv
          source antenv/bin/activate
          pip install --no-cache-dir -r requirements.txt
          pip install --no-cache-dir gunicorn
          deactivate

          # Fix pyvenv.cfg to use Azure's Python path
          echo "[deploy] Fixing pyvenv.cfg for Azure compatibility..."
          sed -i 's|home = .*|home = /opt/python/latest/bin|' antenv/pyvenv.cfg
          cat antenv/pyvenv.cfg

          # Fix shebangs in bin/ scripts to use Azure's Python
          echo "[deploy] Fixing shebangs in antenv/bin/..."
          find antenv/bin -type f -exec grep -l "^#!.*python" {} \; | while read f; do
            sed -i "1s|^#!.*python.*|#!/opt/python/latest/bin/python|" "$f"
          done

          # Remove unnecessary files to reduce zip size
          echo "[deploy] Cleaning up antenv..."
          find antenv -name "*.pyc" -delete 2>/dev/null || true
          find antenv -name "__pycache__" -type d -exec rm -rf {} + 2>/dev/null || true
          find antenv -name "*.dist-info" -type d -exec rm -rf {} + 2>/dev/null || true
          find antenv -name "tests" -type d -exec rm -rf {} + 2>/dev/null || true
          find antenv -name "test" -type d -exec rm -rf {} + 2>/dev/null || true
          rm -rf antenv/share 2>/dev/null || true

          echo "[deploy] antenv size: $(du -sh antenv | cut -f1)"

      - name: Create deploy package
        run: |
          cd backend

          # Clean up code artifacts
          find . -name "__pycache__" -type d -not -path "./antenv/*" -exec rm -rf {} + 2>/dev/null || true
          find . -name "*.pyc" -not -path "./antenv/*" -delete 2>/dev/null || true
          rm -rf .pytest_cache .venv

          # Create zip with code + antenv
          zip -r ../deploy.zip . \
            -x ".pytest_cache/*" \
            -x ".venv/*"

          cd ..
          echo "deploy.zip size: $(ls -lh deploy.zip | awk '{print $5}')"

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_AA4E9EC299D1433D9FF12541F06BA50D }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_AE01A735F8B046C49C5F169706AC5842 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_8E4F3767CE0647AEAA62C4C721F843FE }}

      # ── Step 1: Ensure staging slot exists ──
      - name: Ensure staging slot exists
        run: |
          SLOT_EXISTS=$(az webapp deployment slot list \
            --resource-group ${{ env.AZURE_RG }} \
            --name ${{ env.AZURE_WEBAPP_NAME }} \
            --query "[?name=='${{ env.SLOT_NAME }}'].name" \
            --output tsv 2>/dev/null || echo "")

          if [ -z "$SLOT_EXISTS" ]; then
            echo "Creating staging slot..."
            az webapp deployment slot create \
              --resource-group ${{ env.AZURE_RG }} \
              --name ${{ env.AZURE_WEBAPP_NAME }} \
              --slot ${{ env.SLOT_NAME }} \
              --configuration-source ${{ env.AZURE_WEBAPP_NAME }} \
              --output none
            echo "Staging slot created. Waiting 30s for provisioning..."
            sleep 30
          else
            echo "Staging slot already exists."
          fi

      # ── Step 2: Configure staging slot settings ──
      - name: Configure staging slot
        run: |
          COMMIT_SHA="${{ github.sha }}"
          SHORT_SHA="${COMMIT_SHA:0:7}"
          BUILD_TIME=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          az webapp config appsettings set \
            --resource-group ${{ env.AZURE_RG }} \
            --name ${{ env.AZURE_WEBAPP_NAME }} \
            --slot ${{ env.SLOT_NAME }} \
            --settings \
              SCM_DO_BUILD_DURING_DEPLOYMENT="false" \
              ENABLE_ORYX_BUILD="false" \
              GIT_COMMIT_SHA="$SHORT_SHA" \
              GIT_BRANCH="${{ github.ref_name }}" \
              BUILD_TIME="$BUILD_TIME" \
              DEPLOY_TIME="$BUILD_TIME" \
              WEBSITES_CONTAINER_START_TIME_LIMIT="1800" \
              SALES_DASH_API_KEY="${{ secrets.SALES_DASH_API_KEY }}" \
              SALES_DASH_URL="${{ secrets.SALES_DASH_URL }}" \
              SHOPEE_PARTNER_ID="${{ secrets.SHOPEE_PARTNER_ID }}" \
              SHOPEE_PARTNER_KEY="${{ secrets.SHOPEE_PARTNER_KEY }}" \
              SHOPEE_ACCESS_TOKEN="${{ secrets.SHOPEE_ACCESS_TOKEN }}" \
              SHOPEE_REFRESH_TOKEN="${{ secrets.SHOPEE_REFRESH_TOKEN }}" \
              FACE_SWAP_WORKER_URL="${{ secrets.FACE_SWAP_WORKER_URL }}" \
              FACE_SWAP_WORKER_API_KEY="${{ secrets.FACE_SWAP_WORKER_API_KEY }}" \
              LIVER_CLONE_WORKER_URL="${{ secrets.LIVER_CLONE_WORKER_URL }}" \
              LIVER_CLONE_WORKER_API_KEY="${{ secrets.LIVER_CLONE_WORKER_API_KEY }}" \
            --output none
          echo "Staging slot configured."

          # Wait for SCM container to stabilize after settings change
          # This prevents 'Deployment stopped due to SCM container restart' errors
          echo "Waiting 60s for SCM container to stabilize..."
          sleep 60
          echo "SCM stabilization wait complete."

      # ── Step 3: Deploy to staging slot (production stays untouched) ──
      # Uses retry logic to handle transient SCM restart failures
      - name: Deploy to staging slot
        uses: azure/webapps-deploy@v3
        id: deploy_attempt_1
        continue-on-error: true
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          slot-name: ${{ env.SLOT_NAME }}
          package: deploy.zip

      - name: Retry deploy to staging slot (if first attempt failed)
        if: steps.deploy_attempt_1.outcome == 'failure'
        run: |
          echo "First deploy attempt failed. Waiting 90s for SCM to stabilize before retry..."
          sleep 90

      - name: Deploy to staging slot (retry)
        if: steps.deploy_attempt_1.outcome == 'failure'
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          slot-name: ${{ env.SLOT_NAME }}
          package: deploy.zip

      # ── Step 4: Get staging slot hostname dynamically ──
      - name: Get staging slot hostname
        id: staging_url
        run: |
          # Azure unique default hostnames include a hash, so we must query the actual hostname
          STAGING_HOST=$(az webapp show \
            --resource-group ${{ env.AZURE_RG }} \
            --name ${{ env.AZURE_WEBAPP_NAME }} \
            --slot ${{ env.SLOT_NAME }} \
            --query "defaultHostName" \
            --output tsv)

          echo "Staging hostname: $STAGING_HOST"
          echo "STAGING_URL=https://$STAGING_HOST" >> $GITHUB_OUTPUT

      # ── Step 5: Wait for staging slot to be healthy ──
      - name: Wait for staging slot to be healthy
        run: |
          STAGING_URL="${{ steps.staging_url.outputs.STAGING_URL }}"
          COMMIT_SHA="${{ github.sha }}"
          SHORT_SHA="${COMMIT_SHA:0:7}"

          echo "Waiting for staging slot to start..."
          echo "Staging URL: $STAGING_URL"
          echo "Expected commit: $SHORT_SHA"
          echo ""

          HEALTHY=false
          MAX_ATTEMPTS=40
          INTERVAL=15

          for i in $(seq 1 $MAX_ATTEMPTS); do
            RESPONSE=$(curl -sf --connect-timeout 10 --max-time 20 "$STAGING_URL/version" 2>/dev/null || echo "")

            if [ -n "$RESPONSE" ]; then
              CURRENT_COMMIT=$(echo "$RESPONSE" | python3 -c "import sys,json; print(json.load(sys.stdin).get('commit',''))" 2>/dev/null || echo "")
              UPTIME=$(echo "$RESPONSE" | python3 -c "import sys,json; print(f'{json.load(sys.stdin).get(\"uptime_seconds\",0):.0f}')" 2>/dev/null || echo "?")

              echo "Attempt $i/$MAX_ATTEMPTS: commit=$CURRENT_COMMIT, uptime=${UPTIME}s"

              if [ "$CURRENT_COMMIT" = "$SHORT_SHA" ]; then
                # Also check that the app has been running for at least 10 seconds
                UPTIME_NUM=$(echo "$RESPONSE" | python3 -c "import sys,json; print(int(json.load(sys.stdin).get('uptime_seconds',0)))" 2>/dev/null || echo "0")
                if [ "$UPTIME_NUM" -ge 10 ]; then
                  echo ""
                  echo "Staging slot is healthy: commit=$SHORT_SHA, uptime=${UPTIME}s"
                  HEALTHY=true
                  break
                else
                  echo "  (correct commit but uptime only ${UPTIME}s, waiting for stability...)"
                fi
              else
                echo "  (waiting for $SHORT_SHA, currently $CURRENT_COMMIT)"
              fi
            else
              echo "Attempt $i/$MAX_ATTEMPTS: staging not responding yet"
            fi

            sleep $INTERVAL
          done

          if [ "$HEALTHY" != "true" ]; then
            echo ""
            echo "::error::Staging slot health check failed after $MAX_ATTEMPTS attempts. Aborting swap."
            exit 1
          fi

      # ── Step 6: Swap staging → production (zero downtime!) ──
      - name: Swap staging to production
        run: |
          echo "Swapping staging → production..."
          az webapp deployment slot swap \
            --resource-group ${{ env.AZURE_RG }} \
            --name ${{ env.AZURE_WEBAPP_NAME }} \
            --slot ${{ env.SLOT_NAME }} \
            --target-slot production \
            --output none
          echo "Swap completed! New version is now live."

      # ── Step 7: Update production settings (slot-sticky) ──
      - name: Update production app settings
        run: |
          COMMIT_SHA="${{ github.sha }}"
          SHORT_SHA="${COMMIT_SHA:0:7}"
          BUILD_TIME=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          az webapp config appsettings set \
            --resource-group ${{ env.AZURE_RG }} \
            --name ${{ env.AZURE_WEBAPP_NAME }} \
            --settings \
              GIT_COMMIT_SHA="$SHORT_SHA" \
              GIT_BRANCH="${{ github.ref_name }}" \
              BUILD_TIME="$BUILD_TIME" \
              DEPLOY_TIME="$BUILD_TIME" \
              WEBSITES_CONTAINER_START_TIME_LIMIT="1800" \
              SCM_DO_BUILD_DURING_DEPLOYMENT="false" \
              ENABLE_ORYX_BUILD="false" \
              SALES_DASH_API_KEY="${{ secrets.SALES_DASH_API_KEY }}" \
              SALES_DASH_URL="${{ secrets.SALES_DASH_URL }}" \
              SHOPEE_PARTNER_ID="${{ secrets.SHOPEE_PARTNER_ID }}" \
              SHOPEE_PARTNER_KEY="${{ secrets.SHOPEE_PARTNER_KEY }}" \
              SHOPEE_ACCESS_TOKEN="${{ secrets.SHOPEE_ACCESS_TOKEN }}" \
              SHOPEE_REFRESH_TOKEN="${{ secrets.SHOPEE_REFRESH_TOKEN }}" \
              FACE_SWAP_WORKER_URL="${{ secrets.FACE_SWAP_WORKER_URL }}" \
              FACE_SWAP_WORKER_API_KEY="${{ secrets.FACE_SWAP_WORKER_API_KEY }}" \
              LIVER_CLONE_WORKER_URL="${{ secrets.LIVER_CLONE_WORKER_URL }}" \
              LIVER_CLONE_WORKER_API_KEY="${{ secrets.LIVER_CLONE_WORKER_API_KEY }}" \
            --output none

      # ── Step 8: Configure health check & Always On ──
      - name: Configure health check and Always On
        run: |
          # Enable Always On (prevents cold starts)
          az webapp config set \
            --resource-group ${{ env.AZURE_RG }} \
            --name ${{ env.AZURE_WEBAPP_NAME }} \
            --always-on true \
            --output none

          # Set health check path
          az webapp config set \
            --resource-group ${{ env.AZURE_RG }} \
            --name ${{ env.AZURE_WEBAPP_NAME }} \
            --generic-configurations '{"healthCheckPath": "/version"}' \
            --output none

          echo "Always On enabled, health check path set to /version"

      - name: Logout from Azure
        if: always()
        run: az logout

  verify_deploy:
    needs: build_and_deploy
    if: always() && needs.build_and_deploy.result != 'cancelled'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Verify production is running new version
        env:
          EXPECTED_COMMIT: ${{ github.sha }}
        run: |
          API_URL="https://aitherhubapi-cpcjcnezbgf5f7e2.japaneast-01.azurewebsites.net"
          SHORT_SHA="${EXPECTED_COMMIT:0:7}"
          echo "Expected commit: $SHORT_SHA"
          echo ""

          VERIFIED=false
          MAX_ATTEMPTS=10
          INTERVAL=15

          for i in $(seq 1 $MAX_ATTEMPTS); do
            RESPONSE=$(curl -sf --connect-timeout 10 --max-time 15 "$API_URL/version" 2>/dev/null || echo "")

            if [ -n "$RESPONSE" ]; then
              CURRENT_COMMIT=$(echo "$RESPONSE" | python3 -c "import sys,json; print(json.load(sys.stdin).get('commit',''))" 2>/dev/null || echo "")
              UPTIME=$(echo "$RESPONSE" | python3 -c "import sys,json; print(f'{json.load(sys.stdin).get(\"uptime_seconds\",0):.0f}')" 2>/dev/null || echo "?")

              echo "Attempt $i/$MAX_ATTEMPTS: commit=$CURRENT_COMMIT, uptime=${UPTIME}s"

              if [ "$CURRENT_COMMIT" = "$SHORT_SHA" ]; then
                echo ""
                echo "Deploy verified: commit $SHORT_SHA is live in production."
                VERIFIED=true
                break
              else
                echo "  (waiting for $SHORT_SHA, currently $CURRENT_COMMIT)"
              fi
            else
              echo "Attempt $i/$MAX_ATTEMPTS: API not responding"
            fi

            sleep $INTERVAL
          done

          if [ "$VERIFIED" != "true" ]; then
            echo ""
            echo "::warning::Deploy verification timed out. Swap may still be propagating."
          fi

      - name: Final health check
        if: always()
        run: |
          API_URL="https://aitherhubapi-cpcjcnezbgf5f7e2.japaneast-01.azurewebsites.net"
          echo "=== Version ==="
          curl -sf --max-time 15 "$API_URL/version" 2>/dev/null || echo "No response"
          echo ""
          echo "=== Root ==="
          curl -sf --max-time 15 "$API_URL/" 2>/dev/null || echo "No response"
          echo ""
          echo "=== Auto-video health ==="
          curl -sf --max-time 15 "$API_URL/api/v1/auto-video/health" 2>/dev/null || echo "No response"
